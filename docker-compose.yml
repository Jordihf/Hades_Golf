version: '3.8'

services:
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - react-app

volumes:
  caddy_data:
  caddy_config:
